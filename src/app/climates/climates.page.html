<ion-header [translucent]="true">
  <ion-toolbar style="--background: #3a2f6b; --color: white;">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" style="color: white;"></ion-back-button>
    </ion-buttons>
    <ion-title style="font-weight: 700;">Climate Types</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" style="--background: linear-gradient(to bottom, #3a2f6b 0%, #36669c 100%);">
  <div class="ion-padding">
    <ion-list lines="none" style="background: transparent;">
      <ion-card *ngFor="let climate of climates" style="--background: rgba(255, 255, 255, 0.1); border-radius: 16px; margin-bottom: 16px; border: 1px solid rgba(65, 160, 174, 0.3);">
        <ion-item button detail="true" [routerLink]="'/' + climate.name.toLowerCase()" style="--background: transparent; --color: white; padding: 10px;">
          <ion-icon slot="start" [name]="climate.icon" [style.color]="climate.color" style="font-size: 2.5rem;"></ion-icon>
          <ion-label>
            <h2 style="font-weight: 700; color: white; font-size: 1.3rem;">{{ climate.name }}</h2>
            <p style="color: rgba(255, 255, 255, 0.8); font-size: 0.95rem; white-space: normal;">{{ climate.description }}</p>
          </ion-label>
        </ion-item>
      </ion-card>
    </ion-list>
  </div>
</ion-content>
