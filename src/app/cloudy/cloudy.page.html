<ion-header [translucent]="true">
  <ion-toolbar style="--background: #3a2f6b; --color: white;">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/climates" style="color: white;"></ion-back-button>
    </ion-buttons>
    <ion-title style="font-weight: 700;">Cloudy Climate</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" style="--background: linear-gradient(to bottom, #3a2f6b 0%, #a2a2a2 100%);">
  <div class="ion-padding ion-text-center">
    <ion-card style="--background: rgba(255, 255, 255, 0.1); border-radius: 16px; margin-top: 20px; border: 1px solid rgba(162, 162, 162, 0.3);">
      <ion-card-content>
        <ion-icon name="cloud-outline" style="font-size: 4rem; color: #a2a2a2;"></ion-icon>
        <h2 style="font-weight: 700; color: white; font-size: 1.8rem; margin-top: 10px;">Cloudy</h2>
        <p style="color: rgba(255, 255, 255, 0.8); font-size: 1rem; line-height: 1.5; margin-bottom: 20px;">
          Skies covered with clouds, limiting direct sunlight. A cool and pleasant atmosphere.
          Good for a walk!
        </p>

        <div style="text-align: left; background: rgba(0, 0, 0, 0.2); padding: 15px; border-radius: 12px;">
          <h3 style="color: #a2a2a2; font-weight: 600; margin-top: 0;">Sudden Weather Change Risks:</h3>
          <ion-list lines="none" style="background: transparent;">
            <ion-item button (click)="openSicknessInfo('Flu / Common Cold')" style="--background: transparent; --color: white;">Flu / Common Cold</ion-item>
            <ion-item button (click)="openSicknessInfo('Migraine')" style="--background: transparent; --color: white;">Migraine</ion-item>
            <ion-item button (click)="openSicknessInfo('Body Pain')" style="--background: transparent; --color: white;">Body Pain</ion-item>
            <ion-item button (click)="openSicknessInfo('Allergies')" style="--background: transparent; --color: white;">Allergies</ion-item>
          </ion-list>
        </div>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
