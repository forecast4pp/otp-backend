<ion-header [translucent]="true">
  <ion-toolbar style="--background: #3a2f6b; --color: white;">
    <ion-title style="font-weight: 700;">Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" style="--background: linear-gradient(to bottom, #3a2f6b 0%, #36669c 100%);">

  <ion-header collapse="condense">
    <ion-toolbar style="--background: transparent;">
      <ion-title size="large" style="color: white; font-weight: 700;">Login</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="ion-padding">

    <ion-card style="--background: linear-gradient(135deg, #3a2f6b 0%, #36669c 100%); border: 2px solid #41a0ae; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
      <ion-card-header>
        <ion-card-title class="ion-text-center" style="color: white; font-weight: 700;">
          Welcome Back!
        </ion-card-title>
        <ion-card-subtitle class="ion-text-center" style="color: #77f07f;">
          Login to your account
        </ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>

        <ion-list lines="full" style="background: transparent;">

          <!-- EMAIL OR USERNAME -->
          <ion-item style="--background: transparent; --padding-start: 0; --inner-padding-end: 0; --color: white;">
            <ion-input
              label="Email or Username"
              labelPlacement="floating"
              type="text"
              placeholder="Enter email or username"
              [(ngModel)]="identifier"
              style="--highlight-color-focused: #41a0ae; --color: white; color: white;"
            ></ion-input>
          </ion-item>

          <!-- PIN -->
          <ion-item style="--background: transparent; --padding-start: 0; --inner-padding-end: 0; --color: white;">
            <ion-input
              label="6-Digit PIN"
              labelPlacement="floating"
              type="password"
              maxlength="6"
              placeholder="Enter your PIN"
              [(ngModel)]="pin"
              style="--highlight-color-focused: #41a0ae; --color: white; color: white;"
            ></ion-input>
          </ion-item>

        </ion-list>

        <!-- LOGIN BUTTON -->
        <ion-button expand="block" class="ion-margin-top" (click)="onLogin()" style="--background: #41a0ae; --color: white; --border-radius: 12px;">Login</ion-button>

        <!-- FORGOT -->
        <ion-button expand="block" fill="clear" class="ion-margin-top" style="--color: #41a0ae;">
          Forgot PIN?
        </ion-button>

        <!-- REGISTER -->
        <ion-button expand="block" fill="outline" class="ion-margin-top" routerLink="/register" style="--color: #3ec995; --border-color: #3ec995; --border-radius: 12px;">
          Create Account
        </ion-button>

      </ion-card-content>
    </ion-card>

  </div>
</ion-content>
