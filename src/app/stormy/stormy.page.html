<ion-header [translucent]="true">
  <ion-toolbar style="--background: #3a2f6b; --color: white;">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/climates" style="color: white;"></ion-back-button>
    </ion-buttons>
    <ion-title style="font-weight: 700;">Stormy Climate</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" style="--background: linear-gradient(to bottom, #3a2f6b 0%, #7b68ee 100%);">
  <div class="ion-padding ion-text-center">
    <ion-card style="--background: rgba(255, 255, 255, 0.1); border-radius: 16px; margin-top: 20px; border: 1px solid rgba(123, 104, 238, 0.3);">
      <ion-card-content>
        <ion-icon name="thunderstorm-outline" style="font-size: 4rem; color: #7b68ee;"></ion-icon>
        <h2 style="font-weight: 700; color: white; font-size: 1.8rem; margin-top: 10px;">Stormy</h2>
        <p style="color: rgba(255, 255, 255, 0.8); font-size: 1rem; line-height: 1.5; margin-bottom: 20px;">
          Severe weather with thunder, lightning, and heavy rain. Stay safe and avoid travel.
          Seek shelter immediately!
        </p>

        <div style="text-align: left; background: rgba(0, 0, 0, 0.2); padding: 15px; border-radius: 12px;">
          <h3 style="color: #7b68ee; font-weight: 600; margin-top: 0;">Flooded Area Risks:</h3>
          <ion-list lines="none" style="background: transparent;">
            <ion-item button (click)="openSicknessInfo('Leptospirosis')" style="--background: transparent; --color: white;">Leptospirosis</ion-item>
            <ion-item button (click)="openSicknessInfo('Skin Infections')" style="--background: transparent; --color: white;">Skin Infections</ion-item>
            <ion-item button (click)="openSicknessInfo('Tetanus')" style="--background: transparent; --color: white;">Tetanus</ion-item>
            <ion-item button (click)="openSicknessInfo('Diarrheal Diseases')" style="--background: transparent; --color: white;">Diarrheal Diseases</ion-item>
          </ion-list>
        </div>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
