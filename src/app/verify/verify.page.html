<ion-header [translucent]="true">
  <ion-toolbar style="--background: #3a2f6b; --color: white;">
    <ion-title style="font-weight: 700;">Verify</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" style="--background: linear-gradient(to bottom, #3a2f6b 0%, #36669c 100%);">
  <ion-header collapse="condense">
    <ion-toolbar style="--background: transparent;">
      <ion-title size="large" style="color: white; font-weight: 700;">Verify</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="ion-padding">

    <ion-card style="--background: linear-gradient(135deg, #3a2f6b 0%, #36669c 100%); border: 1px solid #41a0ae; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
      <ion-card-header>
        <ion-card-title class="ion-text-center" style="color: white; font-weight: 700;">
          Verification Code
        </ion-card-title>
      </ion-card-header>

      <ion-card-content>

        <p class="ion-text-center" style="color: white;">
          Please enter the 6-digit code sent to your registered email.
        </p>

        <ion-list lines="none" style="background: transparent;">
          <ion-item class="ion-text-center" style="--background: transparent; --color: white;">

            <!-- ✅ OTP INPUT (BOUND TO TS) -->
            <ion-input
              [(ngModel)]="otpInput"
              type="text"
              inputmode="numeric"
              maxlength="6"
              placeholder="000000"
              style="font-size: 32px; letter-spacing: 12px; font-weight: bold; --padding-start: 0; --color: white; color: white; --highlight-color-focused: #41a0ae;"
            ></ion-input>

          </ion-item>
        </ion-list>

        <!-- ✅ VERIFY BUTTON (CALLS FUNCTION) -->
        <ion-button
          expand="block"
          class="ion-margin-top"
          (click)="verifyOtp()"
          style="--background: #41a0ae; --color: white; --border-radius: 12px;"
        >
          Verify & Login
        </ion-button>

        <div class="ion-text-center ion-margin-top">

          <!-- (Optional later: resend OTP logic) -->
          <ion-button fill="clear" size="small" style="--color: #3ec995;">
            Didn't receive code? Resend
          </ion-button>

        </div>

      </ion-card-content>
    </ion-card>

  </div>
</ion-content>
